version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: mongo-prisma
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    command: >
      mongod --replSet rs0 --bind_ip_all
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate() }" | mongosh --quiet
      interval: 5s
      timeout: 30s
      retries: 5

volumes:
  mongo_data: